<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>진아로그</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="main-header">
      <div class="profile-area">
        <img src="assets/img/BlogLogo.jpg" alt="프로필 로고" />
      </div>
      <div class="title">
        <h1>진아 블로그</h1>
        <p>환영합니다!</p>
      </div>
      <div class="social-link-area">
        <a
          href="https://github.com/jinaaaaaaaaaaaaa"
          target="_blank"
          rel="noopener noreferrer"
        >
          <img src="assets/icon/GithubIcon.svg" alt="깃허브 아이콘" />
        </a>
      </div>
    </header>
    <div class="container">
      <nav aria-label="페이지 섹션 바로가기">
        <ul>
          <li><a href="#photo-dump">포토덤프</a></li>
          <li><a href="#album">사진첩</a></li>
          <li><a href="#interest">내 관심사</a></li>
          <li><a href="#friends">웹왔니 친구들에게</a></li>
        </ul>
      </nav>
      <main>
        <section id="photo-dump">
          <header class="section-header">
            <img src="assets/icon/CameraIcon.png" alt="카메라 아이콘" />
            <h2>포토덤프</h2>
          </header>
          <div class="grid-layout">
            <div class="card item1">
              <img
                src="assets/img/PhotoDump3.jpg"
                alt="비둘기 밥주는 아기진아 사진"
              />
            </div>
            <div class="card item2">
              <img
                src="assets/img/PhotoDump8.jpg"
                alt="인사하는 아기진아 사진"
              />
            </div>
            <div class="card item3">
              <img
                src="assets/img/PhotoDump6.jpg"
                alt="캔디 공연한 진아 사진"
              />
            </div>
            <div class="card item4">
              <img src="assets/img/PhotoDump1.jpg" alt="멋진 괌 강아지 사진" />
            </div>
            <div class="card item5">
              <img src="assets/img/PhotoDump5.jpg" alt="학생회 단체사진" />
            </div>
            <div class="card item6">
              <img src="assets/img/PhotoDump.jpg" alt="브이하는 진아 사진" />
            </div>
          </div>
        </section>
        <section id="album">
          <header class="section-header">
            <img src="assets/icon/HeartIcon.png" alt="하트 아이콘" />
            <h2>좋아하는 것: 코코</h2>
          </header>
          <div class="row-scroll-container">
            <div class="image-box">
              <img src="assets/img/LikeImg1.jpg" alt="외계인 코코 사진" />
            </div>
            <div class="image-box">
              <img src="assets/img/LikeImg2.jpg" alt="행복한 코코 사진" />
            </div>
            <div class="image-box">
              <img src="assets/img/LikeImg3.jpg" alt="샤워하는 코코 사진" />
            </div>
            <div class="image-box">
              <img src="assets/img/LikeImg4.jpg" alt="앉아있는 코코 사진" />
            </div>
            <div class="image-box">
              <img src="assets/img/LikeImg5.jpg" alt="원피스입은 코코 사진" />
            </div>
            <div class="image-box">
              <img src="assets/img/LikeImg6.jpg" alt="한복입은 코코 사진" />
            </div>
            <div class="image-box">
              <img src="assets/img/LikeImg7.jpg" alt="귀여운 코코 사진" />
            </div>
            <div class="image-box">
              <img
                src="assets/img/LikeImg8.jpg"
                alt="들킨 표정짓는 코코 사진"
              />
            </div>
            <div class="image-box">
              <img
                src="assets/img/LikeImg9.jpg"
                alt="방석에 들어간 코코 사진"
              />
            </div>
            <div class="image-box">
              <img src="assets/img/LikeImg10.jpg" alt="애기 코코 사진" />
            </div>
          </div>
        </section>
        <section id="interest">
          <header class="section-header">
            <img src="assets/icon/InterestIcon.png" alt="관심사 아이콘" />
            <h2>내 관심사</h2>
          </header>
          <div class="interest-grid">
            <article class="item-box">
              <img src="assets/img/LikeImg.jpg" alt="관심사 이미지" />
              <div class="item-content">
                <h3>코코</h3>
                <div class="button-container">
                  <button class="like-button" type="button">좋아요</button>
                  <button class="dislike-button" type="button">싫어요</button>
                </div>
              </div>
            </article>
            <article class="item-box">
              <img src="assets/img/InterestImg2.jpg" alt="관심사 이미지" />
              <div class="item-content">
                <h3>물개</h3>
                <div class="button-container">
                  <button class="like-button" type="button">좋아요</button>
                  <button class="dislike-button" type="button">싫어요</button>
                </div>
              </div>
            </article>
            <article class="item-box">
              <img src="assets/img/InterestImg3.jpg" alt="관심사 이미지" />
              <div class="item-content">
                <h3>카피바라</h3>
                <div class="button-container">
                  <button class="like-button" type="button">좋아요</button>
                  <button class="dislike-button" type="button">싫어요</button>
                </div>
              </div>
            </article>
            <article class="item-box">
              <img src="assets/img/InterestImg4.jpg" alt="관심사 이미지" />
              <div class="item-content">
                <h3>다이어트</h3>
                <div class="button-container">
                  <button class="like-button" type="button">좋아요</button>
                  <button class="dislike-button" type="button">싫어요</button>
                </div>
              </div>
            </article>
            <article class="item-box">
              <img src="assets/img/InterestImg5.jpg" alt="관심사 이미지" />
              <div class="item-content">
                <h3>해산물</h3>
                <div class="button-container">
                  <button class="like-button" type="button">좋아요</button>
                  <button class="dislike-button" type="button">싫어요</button>
                </div>
              </div>
            </article>
            <article class="item-box">
              <img src="assets/img/InterestImg6.jpg" alt="관심사 이미지" />
              <div class="item-content">
                <h3>암꽃게찜</h3>
                <div class="button-container">
                  <button class="like-button" type="button">좋아요</button>
                  <button class="dislike-button" type="button">싫어요</button>
                </div>
              </div>
            </article>
            <article class="item-box">
              <img src="assets/img/InterestImg7.jpg" alt="관심사 이미지" />
              <div class="item-content">
                <h3>돈</h3>
                <div class="button-container">
                  <button class="like-button" type="button">좋아요</button>
                  <button class="dislike-button" type="button">싫어요</button>
                </div>
              </div>
            </article>
          </div>
        </section>
        <section id="friends">
          <header class="section-header">
            <img src="assets/icon/SendIcon.png" alt="To.웹왔니 아이콘" />
            <h2>To. 우리집에 웹왔니</h2>
          </header>
          <ul class="message-list">
            <li>웹왔니 여러분 잘부탁드려요~~!!</li>
            <li>열심히 마스터해보아요!!!~~</li>
          </ul>
        </section>
      </main>
    </div>
    <footer>
      <p>읽어주셔서 감사합니다~~~</p>
    </footer>
  </body>
</html>
