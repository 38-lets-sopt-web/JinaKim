<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>진아로그</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="main-header">
      <div class="left">
        <img src="images/BlogLogo.jpg" alt="프로필 로고" />
      </div>
      <div class="title">
        <h3>진아 블로그</h3>
        <h6>환영합니다!</h6>
      </div>
      <div class="right">
        <a href="https://github.com/jinaaaaaaaaaaaaa" target="_blank">
          <img src="images/GithubIcon.svg" alt="깃허브 아이콘" />
        </a>
      </div>
    </header>
    <div class="container">
      <nav>
        <ul>
          <li><a href="#photo-dump">포토덤프</a></li>
          <li><a href="#album">사진첩</a></li>
          <li><a href="#interest">내 관심사</a></li>
          <li><a href="#friends">웹왔니 친구들에게</a></li>
        </ul>
      </nav>
      <main>
        <section id="photo-dump">
          <header class="section-header">
            <img src="images/CameraIcon.png" alt="카메라 아이콘" />
            <h3>포토덤프</h3>
          </header>
          <div class="grid-layout">
            <div class="card item1">
              <img src="images/PhotoDump3.jpg" alt="포토덤프 이미지" />
            </div>
            <div class="card item2">
              <img src="images/PhotoDump8.jpg" alt="포토덤프 이미지" />
            </div>
            <div class="card item3">
              <img src="images/PhotoDump6.jpg" alt="포토덤프 이미지" />
            </div>
            <div class="card item4">
              <img src="images/PhotoDump1.jpg" alt="포토덤프 이미지" />
            </div>
            <div class="card item5">
              <img src="images/PhotoDump5.jpg" alt="포토덤프 이미지" />
            </div>
            <div class="card item6">
              <img src="images/PhotoDump.jpg" alt="포토덤프 이미지" />
            </div>
          </div>
        </section>
        <section id="album">
          <header class="section-header">
            <img src="images/HeartIcon.png" alt="카메라 아이콘" />
            <h3>좋아하는 것: 코코</h3>
          </header>
          <div class="row-scroll-container">
            <div class="image-box">
              <img src="images/LikeImg1.jpg" alt="이미지" />
            </div>
            <div class="image-box">
              <img src="images/LikeImg2.jpg" alt="이미지" />
            </div>
            <div class="image-box">
              <img src="images/LikeImg3.jpg" alt="이미지" />
            </div>
            <div class="image-box">
              <img src="images/LikeImg4.jpg" alt="이미지" />
            </div>
            <div class="image-box">
              <img src="images/LikeImg5.jpg" alt="이미지" />
            </div>
            <div class="image-box">
              <img src="images/LikeImg6.jpg" alt="이미지" />
            </div>
            <div class="image-box">
              <img src="images/LikeImg7.jpg" alt="이미지" />
            </div>
            <div class="image-box">
              <img src="images/LikeImg8.jpg" alt="이미지" />
            </div>
            <div class="image-box">
              <img src="images/LikeImg9.jpg" alt="이미지" />
            </div>
            <div class="image-box">
              <img src="images/LikeImg10.jpg" alt="이미지" />
            </div>
          </div>
        </section>
        <section id="interest">
          <header class="section-header">
            <img src="images/InterestIcon.png" alt="카메라 아이콘" />
            <h3>내 관심사</h3>
          </header>
          <div class="flex-container">
            <div class="item-box">
              <img src="images/LikeImg.jpg" alt="관심사 이미지" />
              <div>
                <h4>코코</h4>
                <div class="button-container">
                  <button class="like-button">좋아요</button>
                  <button class="dislike-button">싫어요</button>
                </div>
              </div>
            </div>
            <div class="item-box">
              <img src="images/InterestImg2.jpg" alt="관심사 이미지" />
              <div>
                <h4>물개</h4>
                <div class="button-container">
                  <button class="like-button">좋아요</button>
                  <button class="dislike-button">싫어요</button>
                </div>
              </div>
            </div>
            <div class="item-box">
              <img src="images/InterestImg3.jpg" alt="관심사 이미지" />
              <div>
                <h4>카피바라</h4>
                <div class="button-container">
                  <button class="like-button">좋아요</button>
                  <button class="dislike-button">싫어요</button>
                </div>
              </div>
            </div>
            <div class="item-box">
              <img src="images/InterestImg4.jpg" alt="관심사 이미지" />
              <div>
                <h4>다이어트</h4>
                <div class="button-container">
                  <button class="like-button">좋아요</button>
                  <button class="dislike-button">싫어요</button>
                </div>
              </div>
            </div>
            <div class="item-box">
              <img src="images/InterestImg5.jpg" alt="관심사 이미지" />
              <div>
                <h4>해산물</h4>
                <div class="button-container">
                  <button class="like-button">좋아요</button>
                  <button class="dislike-button">싫어요</button>
                </div>
              </div>
            </div>
            <div class="item-box">
              <img src="images/InterestImg6.jpg" alt="관심사 이미지" />
              <div>
                <h4>암꽃게찜</h4>
                <div class="button-container">
                  <button class="like-button">좋아요</button>
                  <button class="dislike-button">싫어요</button>
                </div>
              </div>
            </div>
            <div class="item-box">
              <img src="images/InterestImg7.jpg" alt="관심사 이미지" />
              <div>
                <h4>돈</h4>
                <div class="button-container">
                  <button class="like-button">좋아요</button>
                  <button class="dislike-button">싫어요</button>
                </div>
              </div>
            </div>
          </div>
        </section>
        <section id="friends">
          <header class="section-header">
            <img src="images/SendIcon.png" alt="카메라 아이콘" />
            <h3>To. 우리집에 웹왔니</h3>
          </header>
          <div class="message-box">
            <p>웹왔니 여러분 잘부탁드려요~~!!</p>
            <p>열심히 마스터해보아요!!!~~</p>
          </div>
        </section>
      </main>
    </div>
    <footer>읽어주셔서 감사합니다~~~</footer>
  </body>
</html>
